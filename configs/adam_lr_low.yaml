# ============================================================================
# Experiment: Low Adam Learning Rate (lr = 0.0001)
# ============================================================================
# 10× smaller than canonical Adam learning rate.  More conservative warmup:
# the network moves slowly but steadily toward lower loss regions.
#
# Hypothesis: a gentle warmup might land in a smoother part of the loss
# landscape, giving BFGS better curvature to exploit.
# Counter: too slow — Adam wastes its 2,000 epoch budget making small steps.
#
# Purpose: test sensitivity of the full pipeline to Adam's learning rate.
# ============================================================================

experiment:
  name: "adam_lr_low"
  description: >
    Adam LR = 0.0001 (0.1× canonical).  Tests whether conservative warmup
    leads to better BFGS convergence.

equation:
  D: 1.0
  a2: 1.0
  a4: 1.0

domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true

initial_condition:
  type: "uniform_random"
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42

boundary_conditions:
  type: "periodic"
  enforcement: "soft"
  derivative_order: 1

network:
  layer_dims: [3, 40, 40, 40, 40, 1]
  activation: "tanh"
  output_scaling: 1.0
  final_layer_init: "variance_scaling"

training:
  adam:
    epochs: 2000
    lr: 0.0001              # 0.1× canonical
    betas: [0.99, 0.999]
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 10000
    batch_size: 500
    method: "BFGS"
    variant: "SSBroyden2"
    initial_scale: false
    power: 1.0

sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000

loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0

logging:
  print_every: 100
  results_dir: "results/adam_lr_low"

seed: 2
dtype: "float64"
