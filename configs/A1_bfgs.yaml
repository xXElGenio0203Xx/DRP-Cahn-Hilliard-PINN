# ========================================================================
# A1_bfgs
# ========================================================================
#   Standard BFGS (textbook formula, no self-scaling). Baseline
#   quasi-Newton method. The paper reports BFGS consistently underperforms
#   SSBroyden by 2-3 orders of magnitude on Burgers (Table 2: BFGS ~1e-5
#   vs SSBroyden ~1e-8). Differs from canonical: variant=BFGS instead of
#   SSBroyden2.
# ========================================================================

experiment:
  name: A1_bfgs
  description: 'Standard BFGS (textbook formula, no self-scaling). Baseline quasi-Newton
    method. The paper reports BFGS consistently underperforms SSBroyden by 2-3 orders
    of magnitude on Burgers (Table 2: BFGS ~1e-5 vs SSBroyden ~1e-8). Differs from
    canonical: variant=BFGS instead of SSBroyden2.'
equation:
  D: 1.0
  a2: 1.0
  a4: 1.0
domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true
initial_condition:
  type: uniform_random
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42
boundary_conditions:
  type: periodic
  enforcement: soft
  derivative_order: 1
network:
  layer_dims:
  - 3
  - 20
  - 20
  - 20
  - 20
  - 1
  activation: tanh
  output_scaling: 1.0
  final_layer_init: variance_scaling
training:
  adam:
    epochs: 1000
    lr: 0.001
    betas:
    - 0.99
    - 0.999
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 50000
    batch_size: 500
    method: BFGS
    variant: BFGS
    initial_scale: false
    power: 1.0
sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000
loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0
logging:
  print_every: 500
  results_dir: results/A1_bfgs
seed: 2
dtype: float64
