# ============================================================================
# Experiment: Vanilla BFGS (No Self-Scaling)
# ============================================================================
# Standard BFGS from SciPy without any self-scaling modification.
# H₀ = I and is updated via the classical BFGS formula.
#
# Purpose: baseline second-order method for comparison against self-scaled
# variants.  Self-scaling methods modify how H₀ is initialised/updated.
# ============================================================================

experiment:
  name: "bfgs_vanilla"
  description: >
    Standard (non-self-scaled) BFGS.  2,000 Adam warmup followed by 10,000
    iterations of vanilla scipy BFGS.  Shows the benefit of self-scaling.

equation:
  D: 1.0
  a2: 1.0
  a4: 1.0

domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true

initial_condition:
  type: "uniform_random"
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42

boundary_conditions:
  type: "periodic"
  enforcement: "soft"
  derivative_order: 1

network:
  layer_dims: [3, 40, 40, 40, 40, 1]
  activation: "tanh"
  output_scaling: 1.0
  final_layer_init: "variance_scaling"

# --- Training (VARIED) -----------------------------------------------------
training:
  adam:
    epochs: 2000
    lr: 0.001
    betas: [0.99, 0.999]
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 10000
    batch_size: 500
    method: "BFGS"
    variant: "BFGS_scipy"    # Standard BFGS, no self-scaling
    initial_scale: false
    power: 1.0

sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000

loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0

logging:
  print_every: 100
  results_dir: "results/bfgs_vanilla"

seed: 2
dtype: "float64"
