# ========================================================================
# C2_wide_5x30
# ========================================================================
#   Wider network: 5 hidden layers x 30 neurons = 3,871 parameters.
#   Parallels GL Case 1 (5x30 = 3,184 params with 2 outputs) and KS (5x30
#   = 4,411 params with Fourier encoding). Tests whether width (more
#   expressiveness per layer) is more effective than depth for CH.
#   Hessian: ~120 MB (fits in 4GB memory). Differs from canonical:
#   [3,30,30,30,30,30,1] instead of [3,20,20,20,20,1].
# ========================================================================

experiment:
  name: C2_wide_5x30
  description: 'Wider network: 5 hidden layers x 30 neurons = 3,871 parameters. Parallels
    GL Case 1 (5x30 = 3,184 params with 2 outputs) and KS (5x30 = 4,411 params with
    Fourier encoding). Tests whether width (more expressiveness per layer) is more
    effective than depth for CH. Hessian: ~120 MB (fits in 4GB memory). Differs from
    canonical: [3,30,30,30,30,30,1] instead of [3,20,20,20,20,1].'
equation:
  D: 1.0
  a2: 1.0
  a4: 1.0
domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true
initial_condition:
  type: uniform_random
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42
boundary_conditions:
  type: periodic
  enforcement: soft
  derivative_order: 1
network:
  layer_dims:
  - 3
  - 30
  - 30
  - 30
  - 30
  - 30
  - 1
  activation: tanh
  output_scaling: 1.0
  final_layer_init: variance_scaling
training:
  adam:
    epochs: 1000
    lr: 0.001
    betas:
    - 0.99
    - 0.999
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 50000
    batch_size: 500
    method: BFGS
    variant: SSBroyden2
    initial_scale: false
    power: 1.0
sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000
loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0
logging:
  print_every: 500
  results_dir: results/C2_wide_5x30
seed: 2
dtype: float64
