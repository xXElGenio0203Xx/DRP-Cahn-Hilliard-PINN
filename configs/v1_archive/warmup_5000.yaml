# ============================================================================
# Experiment: Long Adam Warmup (5,000 epochs)
# ============================================================================
# Extended Adam phase (5,000 epochs) before SSBroyden2 (vs 2,000 canonical).
# The remaining 7,000 iterations go to the quasi-Newton phase.
#
# Hypothesis: longer warmup gives BFGS a better starting point.  The Hessian
# approximation converges faster when the loss landscape is smoother (closer
# to a local minimum).  Counter-argument: fewer BFGS iterations may not
# be enough to exploit the curvature advantage.
#
# Purpose: test whether extended warmup improves final accuracy.
# ============================================================================

experiment:
  name: "warmup_5000"
  description: >
    Long warmup: 5,000 Adam then 7,000 SSBroyden2.
    Tests whether extra first-order pretraining helps BFGS converge.

equation:
  D: 1.0
  a2: 1.0
  a4: 1.0

domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true

initial_condition:
  type: "uniform_random"
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42

boundary_conditions:
  type: "periodic"
  enforcement: "soft"
  derivative_order: 1

network:
  layer_dims: [3, 20, 20, 20, 20, 1]
  activation: "tanh"
  output_scaling: 1.0
  final_layer_init: "variance_scaling"

training:
  adam:
    epochs: 5000            # Extended warmup
    lr: 0.001
    betas: [0.99, 0.999]
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 7000            # Remainder of 12,000 budget
    batch_size: 500
    method: "BFGS"
    variant: "SSBroyden2"
    initial_scale: false
    power: 1.0

sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000

loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0

logging:
  print_every: 100
  results_dir: "results/warmup_5000"

seed: 2
dtype: "float64"
