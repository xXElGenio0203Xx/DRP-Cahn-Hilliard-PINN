# ============================================================================
# Experiment: L-BFGS-B (Limited-Memory BFGS)
# ============================================================================
# Limited-memory BFGS from SciPy.  Instead of storing the full n×n inverse
# Hessian (~210 MB for 5,121 params), L-BFGS-B stores only `maxcor`
# (s, y) vector pairs and reconstructs the approximate H⁻¹ implicitly.
#
# Tradeoffs vs dense BFGS:
#   + Much less memory: O(n·maxcor) vs O(n²)
#   + No Cholesky check needed
#   - Poorer curvature approximation (limited memory)
#   - No warm-starting of Hessian across resampling events
#   - No self-scaling variants available
#
# Purpose: test whether the memory savings of L-BFGS-B are worth the
# reduced curvature information for a network of this size (5,121 params).
# ============================================================================

experiment:
  name: "lbfgs"
  description: >
    Limited-memory BFGS (L-BFGS-B).  2,000 Adam warmup followed by 10,000
    L-BFGS-B iterations with maxcor=20 correction pairs.

equation:
  D: 1.0
  a2: 1.0
  a4: 1.0

domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true

initial_condition:
  type: "uniform_random"
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42

boundary_conditions:
  type: "periodic"
  enforcement: "soft"
  derivative_order: 1

network:
  layer_dims: [3, 20, 20, 20, 20, 1]
  activation: "tanh"
  output_scaling: 1.0
  final_layer_init: "variance_scaling"

training:
  adam:
    epochs: 2000
    lr: 0.001
    betas: [0.99, 0.999]
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 10000
    batch_size: 500
    method: "L-BFGS-B"      # Limited-memory BFGS
    variant: "none"          # Not applicable for L-BFGS-B
    maxcor: 20               # Number of (s, y) correction pairs to store
    initial_scale: false
    power: 1.0

sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000

loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0

logging:
  print_every: 100
  results_dir: "results/lbfgs"

seed: 2
dtype: "float64"
