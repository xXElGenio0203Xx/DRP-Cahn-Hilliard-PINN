# ============================================================================
# Experiment: SSBroyden1 (Self-Scaled Broyden Class, φ = 1)
# ============================================================================
# Self-Scaled Broyden class update with φ = 1, corresponding to the DFP
# limit of the Broyden family.  Contrast with SSBroyden2 (φ optimised).
#
# The Broyden class generalises BFGS (φ=0) through DFP (φ=1).
# SSBroyden2 picks φ to minimise the condition number of H_{k+1}.
# SSBroyden1 forces φ=1 (pure DFP direction).
#
# Purpose: test whether the DFP end of the Broyden family outperforms
# the automatically optimised φ for Cahn-Hilliard.
# ============================================================================

experiment:
  name: "ssbroyden1"
  description: >
    Self-Scaled Broyden class with φ=1 (DFP direction).
    2,000 Adam warmup followed by 10,000 SSBroyden1 iterations.

equation:
  D: 1.0
  a2: 1.0
  a4: 1.0

domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true

initial_condition:
  type: "uniform_random"
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42

boundary_conditions:
  type: "periodic"
  enforcement: "soft"
  derivative_order: 1

network:
  layer_dims: [3, 20, 20, 20, 20, 1]
  activation: "tanh"
  output_scaling: 1.0
  final_layer_init: "variance_scaling"

training:
  adam:
    epochs: 2000
    lr: 0.001
    betas: [0.99, 0.999]
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 10000
    batch_size: 500
    method: "BFGS"
    variant: "SSBroyden1"    # Broyden class φ=1 (DFP direction)
    initial_scale: false
    power: 1.0

sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000

loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0

logging:
  print_every: 100
  results_dir: "results/ssbroyden1"

seed: 2
dtype: "float64"
