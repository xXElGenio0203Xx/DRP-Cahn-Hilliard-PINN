# ============================================================================
# Experiment: Large BFGS Batch Size (Nchange = 1000)
# ============================================================================
# Resample collocation points every 1,000 BFGS iterations (vs 500 canonical).
#
# Effect: BFGS has more iterations on a fixed set of collocation points.
# The Hessian approximation has time to converge closer to the true
# curvature before the landscape shifts.  Fewer resampling events overall
# (10 batches vs 20 for the canonical config).
#
# Tradeoff:
#   + Hessian gets more time to mature → better curvature approximation
#   + Less overhead from resampling + Cholesky checks
#   - Stale collocation points → possible overfitting to a specific sample
#   - RAD benefits are delayed
#
# Purpose: test whether BFGS benefits from longer stable optimization windows.
# ============================================================================

experiment:
  name: "bfgs_batch_1000"
  description: >
    SSBroyden2 with Nchange=1000 (resample every 1000 BFGS iters).
    Tests infrequent resampling vs canonical Nchange=500.

equation:
  D: 1.0
  a2: 1.0
  a4: 1.0

domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true

initial_condition:
  type: "uniform_random"
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42

boundary_conditions:
  type: "periodic"
  enforcement: "soft"
  derivative_order: 1

network:
  layer_dims: [3, 20, 20, 20, 20, 1]
  activation: "tanh"
  output_scaling: 1.0
  final_layer_init: "variance_scaling"

training:
  adam:
    epochs: 2000
    lr: 0.001
    betas: [0.99, 0.999]
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 10000
    batch_size: 1000         # Resample every 1000 iters (canonical = 500)
    method: "BFGS"
    variant: "SSBroyden2"
    initial_scale: false
    power: 1.0

sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000

loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0

logging:
  print_every: 100
  results_dir: "results/bfgs_batch_1000"

seed: 2
dtype: "float64"
