# ========================================================================
# D1_adam_only
# ========================================================================
#   Adam-only baseline — 51,000 Adam epochs, no quasi-Newton phase. Same
#   total iteration budget as canonical (1K Adam + 50K BFGS = 51K). The
#   paper consistently shows Adam alone stalls at much higher loss than
#   quasi-Newton methods. This establishes the performance floor. Differs
#   from canonical: 51000 Adam, 0 BFGS epochs.
# ========================================================================

experiment:
  name: D1_adam_only
  description: 'Adam-only baseline — 51,000 Adam epochs, no quasi-Newton phase. Same
    total iteration budget as canonical (1K Adam + 50K BFGS = 51K). The paper consistently
    shows Adam alone stalls at much higher loss than quasi-Newton methods. This establishes
    the performance floor. Differs from canonical: 51000 Adam, 0 BFGS epochs.'
equation:
  D: 1.0
  a2: 1.0
  a4: 1.0
domain:
  x_min: 0.0
  x_max: 128.0
  y_min: 0.0
  y_max: 128.0
  t_min: 0.0
  t_max: 20.0
  normalize_inputs: true
initial_condition:
  type: uniform_random
  low: -1.0
  high: 1.0
  grid_nx: 128
  grid_ny: 128
  smoothing_sigma: 2.0
  seed: 42
boundary_conditions:
  type: periodic
  enforcement: soft
  derivative_order: 1
network:
  layer_dims:
  - 3
  - 20
  - 20
  - 20
  - 20
  - 1
  activation: tanh
  output_scaling: 1.0
  final_layer_init: variance_scaling
training:
  adam:
    epochs: 51000
    lr: 0.001
    betas:
    - 0.99
    - 0.999
    eps: 1.0e-20
    lr_decay_rate: 0.98
    lr_decay_steps: 1000
  bfgs:
    epochs: 0
    batch_size: 500
    method: BFGS
    variant: none
    initial_scale: false
    power: 1.0
sampling:
  n_interior: 10000
  n_initial: 1000
  n_boundary: 500
  resample_every: 500
  rad:
    enabled: true
    k1: 1.0
    k2: 1.0
    n_candidates: 50000
loss_weights:
  pde: 1.0
  ic: 5.0
  bc: 5.0
logging:
  print_every: 500
  results_dir: results/D1_adam_only
seed: 2
dtype: float64
